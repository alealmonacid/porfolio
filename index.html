<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>Alejandro Almonacid | Front End Developer & Community Manager</title>

    <meta name="keywords" content="Alejandro Almonacid, Front End Developer, VTEX Developer, React Developer, Community Manager, Portfolio, HTML5, CSS3, JavaScript, SCSS, TCG Player, Desarrollador Web" />
    <meta name="author" content="Alejandro Almonacid" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://alejandroalmonacid.dev/" />

    <!-- Open Graph / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alejandroalmonacid.dev/" />
    <meta property="og:title" content="Alejandro Almonacid | Front End Developer" />
    <meta property="og:description" content="Desarrollador Front End con experiencia en VTEX, React JS y e-commerce. Portfolio profesional con proyectos y blog técnico." />
    <meta property="og:image" content="https://alejandroalmonacid.dev/og-image.jpg" />
    <meta property="og:site_name" content="Alejandro Almonacid Portfolio" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alejandro Almonacid | Front End Developer" />
    <meta name="twitter:description" content="Portfolio de Alejandro Almonacid — Front End Dev, TCG Player, Community Manager." />
    <meta name="twitter:image" content="https://alejandroalmonacid.dev/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Mobile browser chrome color -->
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="msapplication-TileColor" content="#0e0e0e" />

    <!-- Google Fonts: preload + non-blocking load to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the most critical weights first -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Chelsea+Market&display=swap" />
    <!-- Non-blocking load: media=print trick swaps to 'all' after load -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Chelsea+Market&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Chelsea+Market&display=swap" rel="stylesheet" />
    </noscript>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
